<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct X Timeline Widget</title>
    <style>
        /* 余白を完全に消し去り、Notionの埋め込み枠にピッタリ合わせるエリートなCSSです */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <iframe src="https://syndication.twitter.com/srv/timeline-profile/screen-name/kannkannna?theme=light" scrolling="yes"></iframe>
</body>
</html>
