<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイラ特製・Notion用埋め込みジェネレーター</title>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f4f8; }
        #ui-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        input[type="text"] { padding: 12px; width: 90%; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #1da1f2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #0c85d0; }
        #result { margin-top: 20px; text-align: left; }
        .result-url { width: 100%; padding: 10px; box-sizing: border-box; background: #e8f0fe; border: 1px solid #b6cff5; border-radius: 4px; margin-bottom: 10px; }
        
        body.embed-mode { display: block; background-color: transparent; height: auto; }
        #widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h2 style="margin-top:0;">Xウィジェット発行機改</h2>
        <p style="font-size:14px; color:#555;">XのアカウントURL、またはIDを入力してください。</p>
        <input type="text" id="twitter-input" placeholder="例: TwitterJP">
        <button onclick="generateNotionURL()">Notion用URLを発行</button>
        <div id="result"></div>
    </div>

    <div id="widget-container" style="display: none;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');

        if (targetId) {
            document.getElementById('ui-container').style.display = 'none';
            document.body.classList.add('embed-mode');
            const widgetContainer = document.getElementById('widget-container');
            widgetContainer.style.display = 'block';
            
            // XのAPIを使って強制的にタイムラインを構築させます！
            function renderTimeline() {
                if (window.twttr && window.twttr.widgets) {
                    window.twttr.widgets.createTimeline(
                        { sourceType: "profile", screenName: targetId },
                        widgetContainer,
                        { theme: "light" }
                    ).then(function (el) {
                        if (!el) {
                            // それでもダメな場合のエラーメッセージ
                            widgetContainer.innerHTML = '<p style="color:red; padding:10px; font-size:12px;">【エラー】X側の仕様制限、またはブラウザの広告ブロッカー/トラッキング防止機能により読み込めませんでした。</p>';
                        }
                    });
                } else {
                    // スクリプトの読み込みが遅い場合は少し待ってから再挑戦します
                    setTimeout(renderTimeline, 100);
                }
            }
            renderTimeline();
        }

        function generateNotionURL() {
            let inputVal = document.getElementById('twitter-input').value.trim();
            if (!inputVal) return;
            if(inputVal.includes('twitter.com/') || inputVal.includes('x.com/')) {
                inputVal = inputVal.split('/').pop().split('?')[0];
            }
            inputVal = inputVal.replace('@', '');
            
            const baseUrl = window.location.origin + window.location.pathname;
            const embedUrl = `${baseUrl}?id=${inputVal}`;
            
            document.getElementById('result').innerHTML = `
                <input type="text" class="result-url" value="${embedUrl}" id="copy-target" readonly>
            `;
        }
    </script>
</body>
</html>
